<svg xmlns="http://www.w3.org/2000/svg" width="443" height="143" viewBox="0 0 443 143" role="img" aria-labelledby="title desc">
  <title id="title">RFMONO dashboard preview</title>
  <desc id="desc">A monochrome Rotorflight telemetry dashboard showing time, battery, RPM, link quality, governor status, and OK status.</desc>
  <rect width="443" height="143" fill="#000000"/>

  <g font-family="'Courier New', monospace" text-rendering="geometricPrecision">
    <g fill="#d9f5ff" font-size="16" font-weight="700">
      <text x="18" y="30">SpecterV2NM</text>
      <text x="189" y="30">DISARMED</text>
      <text x="335" y="30">ROTORFLIGHT</text>
    </g>

    <line x1="18" y1="35" x2="442" y2="35" stroke="#d9f5ff" stroke-width="2"/>

    <rect x="18" y="38" width="124" height="87" fill="#d9f5ff"/>
    <rect x="146" y="38" width="164" height="87" fill="#d9f5ff"/>
    <rect x="314" y="38" width="128" height="87" fill="#d9f5ff"/>

    <line x1="142" y1="38" x2="142" y2="125" stroke="#000000" stroke-width="4"/>
    <line x1="310" y1="38" x2="310" y2="125" stroke="#000000" stroke-width="4"/>

    <g fill="#000000" font-size="16" font-weight="700">
      <text x="61" y="51">TIME</text>
      <text x="212" y="51">BAT</text>
      <text x="359" y="51">RPM</text>
    </g>

    <text x="49" y="87" fill="#000000" font-size="30" font-weight="700">03:30</text>
    <text x="69" y="122" fill="#000000" font-size="17" font-weight="700">P1</text>

    <rect x="153" y="61" width="151" height="33" fill="none" stroke="#000000" stroke-width="2"/>
    <rect x="304" y="69" width="8" height="17" fill="#d9f5ff"/>
    <rect x="304" y="69" width="8" height="17" fill="none" stroke="#000000" stroke-width="2"/>
    <rect x="156" y="64" width="97" height="27" fill="#000000"/>
    <text x="214" y="82" fill="#d9f5ff" font-size="16" font-weight="700">68%</text>
    <text x="183" y="122" fill="#000000" font-size="16" font-weight="700">22.4V 3.73V</text>

    <text x="345" y="88" fill="#000000" font-size="31" font-weight="700">1450</text>
    <text x="337" y="122" fill="#000000" font-size="16" font-weight="700">I38.2 T54</text>

    <g fill="#d9f5ff" font-size="16" font-weight="700">
      <text x="18" y="139">LQ:98</text>
      <text x="184" y="139">GOV ACTIVE</text>
      <text x="418" y="139">OK</text>
    </g>
  </g>
</svg>
